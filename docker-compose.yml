services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: service_booking
      POSTGRES_USER: service_booking
      POSTGRES_PASSWORD: service_booking
    ports:
      - "5432:5432"
    volumes:
      - service_booking_postgres:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_booking -d service_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: golang:1.25-alpine
    working_dir: /workspace/apps/api
    volumes:
      - .:/workspace
      - service_booking_go_cache:/go/pkg/mod
    environment:
      APP_ENV: development
      HTTP_PORT: 8080
      PORT: 8080
      DATABASE_URL: postgres://service_booking:service_booking@postgres:5432/service_booking?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      PUBLIC_WEB_URL: http://127.0.0.1:5173
      ADMIN_WEB_URL: http://127.0.0.1:5174
      ADMIN_DISPLAY_NAME: Service Booking Admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin1234
      BOOKING_SLOT_CAPACITY: 3
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:5173,http://localhost:5174
    command: sh -c "go run ./cmd/api"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  customer:
    image: node:24-alpine
    working_dir: /workspace/apps/customer
    volumes:
      - .:/workspace
      - service_booking_customer_node_modules:/workspace/apps/customer/node_modules
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8080/api/v1
      VITE_LIFF_ID: ""
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - api

  admin:
    image: node:24-alpine
    working_dir: /workspace/apps/admin
    volumes:
      - .:/workspace
      - service_booking_admin_node_modules:/workspace/apps/admin/node_modules
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8080/api/v1
      VITE_WS_BASE_URL: ws://127.0.0.1:8080/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  service_booking_postgres:
  service_booking_go_cache:
  service_booking_customer_node_modules:
  service_booking_admin_node_modules:
